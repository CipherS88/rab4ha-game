<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كروت البلوت - خبير</title>
    <style>
        /* إعدادات الخلفية الداكنة والفخمة */
        body {
            background: radial-gradient(circle at center, #2a2a2b 0%, #111 100%);
            color: #d4af37;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* حاوية اليد: 
         استخدمنا ltr عشان ترتيب المتصفح الطبيعي يخلي الكرت اللي على اليسار تحت، واللي يمينه يركب فوقه 
        */
        .hand {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            width: 100%;
            padding-bottom: 20px;
            direction: ltr; /* السر هنا لترتيب التداخل الصحيح */
        }

        /* غلاف لكل كرت عشان يمسك مكانه ودرجة الميلان */
        .card-wrapper {
            /* حجم الكروت (يكبر ويصغر حسب الشاشة بس حده الأقصى كبير) */
            width: clamp(65px, 11vw, 130px);
            height: clamp(95px, 16vw, 195px);
            /* التداخل: يسحب الكرت لليسار عشان يركب على الكرت اللي قبله */
            margin-left: clamp(-40px, -5vw, -15px);
            position: relative;
        }

        /* الكرت الأول ما نبيه يتداخل مع شيء قبله */
        .card-wrapper:first-child {
            margin-left: 0;
        }

        /* التصميم الداخلي للكرت */
        .card {
            width: 100%;
            height: 100%;
            background-color: #fff;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-shadow: -4px 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            
            /* ترتيب الرقم والرمز داخل الكرت (يسار فوق) */
            display: flex;
            flex-direction: column;
            padding: 8px;
            box-sizing: border-box;
        }

        /* تأثير الرفع عند تمرير الماوس */
        .card-wrapper:hover .card {
            transform: translateY(-25px); /* يرفع الكرت بشكل مستقيم */
            box-shadow: -4px 15px 25px rgba(0,0,0,0.8);
        }

        /* ألوان الكروت */
        .red { color: #d00; }
        .black { color: #000; }

        /* حجم الخطوط للأرقام والأشكال يتغير مع حجم الشاشة */
        .val { font-size: clamp(16px, 3.5vw, 26px); font-weight: bold; line-height: 1; }
        .suit { font-size: clamp(18px, 4vw, 32px); line-height: 1; margin-top: 2px; }

        /* توزيع الميلان والطبقات بشكل مفرود (Wide Fan)
          z-index يضمن إن اليمين فوق اليسار
        */
        .w1 { transform: translateY(12px) rotate(-6deg); z-index: 1; }
        .w2 { transform: translateY(7px) rotate(-4deg); z-index: 2; }
        .w3 { transform: translateY(3px) rotate(-2deg); z-index: 3; }
        .w4 { transform: translateY(0px) rotate(-1deg); z-index: 4; }
        .w5 { transform: translateY(0px) rotate(1deg); z-index: 5; }
        .w6 { transform: translateY(3px) rotate(2deg); z-index: 6; }
        .w7 { transform: translateY(7px) rotate(4deg); z-index: 7; }
        .w8 { transform: translateY(12px) rotate(6deg); z-index: 8; }

        /* معلومات اللاعب (مؤشر مستوى خبير) */
        .player-info {
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 35px;
            border-radius: 20px;
            border: 1px solid #d4af37;
            font-size: 16px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="hand">
        <div class="card-wrapper w1">
            <div class="card red">
                <span class="val">8</span><span class="suit">♥</span>
            </div>
        </div>

        <div class="card-wrapper w2">
            <div class="card red">
                <span class="val">Q</span><span class="suit">♥</span>
            </div>
        </div>

        <div class="card-wrapper w3">
            <div class="card black">
                <span class="val">9</span><span class="suit">♣</span>
            </div>
        </div>

        <div class="card-wrapper w4">
            <div class="card black">
                <span class="val">J</span><span class="suit">♣</span>
            </div>
        </div>

        <div class="card-wrapper w5">
            <div class="card red">
                <span class="val">7</span><span class="suit">♦</span>
            </div>
        </div>

        <div class="card-wrapper w6">
            <div class="card red">
                <span class="val">8</span><span class="suit">♦</span>
            </div>
        </div>

        <div class="card-wrapper w7">
            <div class="card black">
                <span class="val">7</span><span class="suit">♠</span>
            </div>
        </div>

        <div class="card-wrapper w8">
            <div class="card black">
                <span class="val">K</span><span class="suit">♠</span>
            </div>
        </div>

    </div>

    <div class="player-info">
        أنت (خبير)
    </div>

</body>
</html>
